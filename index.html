    <script>
    // Fallback: wait for Octokit to be available
    window._waitForOctokit = () => new Promise((resolve, reject) => {
      if (window.Octokit) return resolve(window.Octokit);
      let tries = 0;
      const interval = setInterval(() => {
        if (window.Octokit) { clearInterval(interval); resolve(window.Octokit); }
        else if (++tries > 50) { clearInterval(interval); reject(new Error('Octokit failed to load')); }
      }, 100);
    });
    </script>

    const { useState, useEffect, useRef } = React;

    // ─── MAIN APP ──────────────────────────────────────────────────
    function App() {
      const [octokit, setOctokit] = useState(null);
          const [config, setConfig] = useState(() => {
            try {
              const saved = localStorage.getItem("ow_studio_config");
              if (saved) {
                const decoded = atob(saved);
                const json = decoded.split("").map((c,i) =>
                  String.fromCharCode(c.charCodeAt(0) ^ (42 + (i % 17)))
                ).join("");
                const p = JSON.parse(json);
                if (p) return { token: p.token||"", owner: p.owner||"", repo: p.repo||"onewaveradio.com", path: p.path||"index.html" };
              }
            } catch(e) {
              try {
                const saved = localStorage.getItem("ow_studio_config");
                if (saved) { const p = JSON.parse(saved); if (p) return { token: p.token||"", owner: p.owner||"", repo: p.repo||"onewaveradio.com", path: p.path||"index.html" }; }
              } catch(e2) {}
            }
            return { token: "", owner: "", repo: "onewaveradio.com", path: "index.html" };
          });
      const [blocks, setBlocks] = useState([]);
      const [blockSizes, setBlockSizes] = useState({});
      const [buttonPositions, setButtonPositions] = useState({});
      const [buttonsLocked, setButtonsLocked] = useState(true);
      const buttonsLockedRef = useRef(true);
      const [loading, setLoading] = useState(false);
      const [message, setMessage] = useState({ text: '', type: '' });
      const previewRef = useRef(null);

          // Encrypt/decrypt helpers for secure token storage
          const encryptConfig = (data) => {
            try {
              const json = JSON.stringify(data);
              return btoa(json.split('').map((c,i) => 
                String.fromCharCode(c.charCodeAt(0) ^ (42 + (i % 17)))
              ).join(''));
            } catch(e) { return null; }
          };
          const decryptConfig = (encrypted) => {
            try {
              const decoded = atob(encrypted);
              const json = decoded.split('').map((c,i) => 
                String.fromCharCode(c.charCodeAt(0) ^ (42 + (i % 17)))
              ).join('');
              return JSON.parse(json);
            } catch(e) { return null; }
          };

          // Persist GitHub config to localStorage (encrypted) whenever it changes
          React.useEffect(() => {
            try {
              const encrypted = encryptConfig(config);
              if (encrypted) localStorage.setItem('ow_studio_config', encrypted);
            } catch(e) {}
          }, [config]);

    // ================================================================
    // AUTO-SAVE: Save all studio state to localStorage every 5 seconds
    // ================================================================
    const AUTO_SAVE_KEY = 'ow_studio_autosave';
    const [autoSaveStatus, setAutoSaveStatus] = React.useState('ok');

    // ====== IndexedDB helpers for background image persistence ======
    const IDB_NAME = 'ow_studio_images';
    const IDB_STORE = 'bgImages';
    const IDB_VERSION = 1;

    const openImageDB = () => {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, IDB_VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(IDB_STORE)) {
            db.createObjectStore(IDB_STORE, { keyPath: 'uid' });
          }
        };
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = (e) => reject(e.target.error);
      });
    };

    const saveBgImagesToDB = async (blocks) => {
      try {
        // Collect valid (non-stripped) background images using DOMParser
        const validImages = [];
        for (const b of blocks) {
          if (!b.html) continue;
          const parser = new DOMParser();
          const doc = parser.parseFromString(b.html, 'text/html');
          const el = doc.body.firstElementChild;
          if (el && el.style.backgroundImage) {
            // el.style.backgroundImage returns: url("data:image/png;base64,...")
            const bgImg = el.style.backgroundImage;
            // Extract URL from url("...") format
            const urlMatch = bgImg.match(/url\(["']?([^"')]+)["']?\)/);
            if (urlMatch && urlMatch[1]) {
              const imgUrl = urlMatch[1];
              if (imgUrl.startsWith('data:image/') && !imgUrl.includes('STRIPPED')) {
                validImages.push({ uid: b.uid, bgImage: imgUrl });
              }
            }
          }
        }
        // Only update IndexedDB if we have valid images to save
        // This prevents clearing stored images when blocks have stripped data
        if (validImages.length === 0) {
          console.log('[AutoSave] No valid bg images to save, preserving IndexedDB');
          return;
        }
        const db = await openImageDB();
        const tx = db.transaction(IDB_STORE, 'readwrite');
        const store = tx.objectStore(IDB_STORE);
        store.clear();
        for (const img of validImages) {
          store.put(img);
        }
        await new Promise((resolve, reject) => {
          tx.oncomplete = resolve;
          tx.onerror = () => reject(tx.error);
        });
        db.close();
        console.log('[AutoSave] Background images saved to IndexedDB (' + validImages.length + ' images)');
      } catch (err) {
        console.warn('[AutoSave] Failed to save bg images to IndexedDB:', err);
      }
    };

    const restoreBlockBgImages = async (ignoredBlocks, setBlocksFn) => {
      try {
        const db = await openImageDB();
        const tx = db.transaction(IDB_STORE, 'readonly');
        const store = tx.objectStore(IDB_STORE);
        const allImages = await new Promise((resolve, reject) => {
          const req = store.getAll();
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
        db.close();
        if (!allImages || allImages.length === 0) return;
        const imgMap = {};
        for (const entry of allImages) {
          imgMap[entry.uid] = entry.bgImage;
        }
        // Use functional state update to always work with latest blocks
        setBlocksFn(prevBlocks => {
          let changed = false;
          const updated = prevBlocks.map(b => {
            if (imgMap[b.uid] && b.html) {
              const hasStripped = b.html.includes('base64,STRIPPED');
              const hasBg = b.html.includes('background-image');
              if (hasStripped || !hasBg) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(b.html, 'text/html');
                const el = doc.body.firstElementChild;
                if (el) {
                  el.style.backgroundImage = 'url(' + imgMap[b.uid] + ')';
                  el.style.backgroundSize = 'cover';
                  el.style.backgroundPosition = 'center';
                  el.style.backgroundRepeat = 'no-repeat';
                  changed = true;
                  return { ...b, html: el.outerHTML };
                }
              }
            }
            return b;
          });
          if (changed) {
            console.log('[AutoSave] Restored background images from IndexedDB');
            return updated;
          }
          return prevBlocks;
        });
      } catch (err) {
        console.warn('[AutoSave] Failed to restore bg images from IndexedDB:', err);
      }
    };

    // Helper: strip base64 data URIs from HTML to reduce storage size
    const stripBase64FromHtml = (html) => {
      if (!html) return html;
      return html.replace(/data:image\/[^;]+;base64,[A-Za-z0-9+\/=]+/g, 'data:image/png;base64,STRIPPED');
    };

    // Manual save function (also used by autosave interval)
    const saveToLocalStorage = React.useCallback(() => {
      try {
        if (blocks.length === 0) return false;
        // Save background images to IndexedDB before stripping
        saveBgImagesToDB(blocks);
        // Create lightweight blocks by stripping base64 images
        const lightBlocks = blocks.map(b => ({
          ...b,
          html: stripBase64FromHtml(b.html)
        }));
        const studioState = {
          blocks: lightBlocks,
          blockSizes: blockSizes,
          buttonPositions: buttonPositions,
          buttonsLocked: buttonsLocked,
          overlayElements: overlayElements,
          savedAt: new Date().toISOString(),
          hasStrippedImages: true
        };
        // Clear old data first to free space
        try { localStorage.removeItem(AUTO_SAVE_KEY); } catch(x) {}
        const data = JSON.stringify(studioState);
        localStorage.setItem(AUTO_SAVE_KEY, data);
        console.log('[AutoSave] State saved (' + Math.round(data.length/1024) + 'KB) at', new Date().toLocaleTimeString());
        setAutoSaveStatus('ok');
        return true;
      } catch (e) {
        console.error('[AutoSave] Failed:', e.name, e.message);
        // Handle QuotaExceededError specifically
        if (e.name === 'QuotaExceededError' || e.code === 22 || e.code === 1014) {
          try {
            localStorage.clear();
            const miniState = {
              blocks: blocks.map(b => ({ uid: b.uid, name: b.name, type: b.type, html: (b.html || '').substring(0, 500) + '<!-- truncated -->' })),
              blockSizes: blockSizes,
              buttonPositions: buttonPositions,
              buttonsLocked: buttonsLocked,
              savedAt: new Date().toISOString(),
              truncated: true
            };
            localStorage.setItem(AUTO_SAVE_KEY, JSON.stringify(miniState));
            console.warn('[AutoSave] Emergency save with truncated blocks');
            setAutoSaveStatus('warning');
            return true;
          } catch (e2) {
            console.error('[AutoSave] Emergency save also failed:', e2);
          }
        }
        setAutoSaveStatus('error');
        return false;
      }
    }, [blocks, blockSizes, buttonPositions, buttonsLocked, overlayElements]);

    React.useEffect(() => {
      const intervalId = setInterval(() => {
        saveToLocalStorage();
      }, 5000);
      return () => clearInterval(intervalId);
    }, [saveToLocalStorage]);

    // RESTORE: Load saved studio state from localStorage on mount
    React.useEffect(() => {
      try {
        const saved = localStorage.getItem(AUTO_SAVE_KEY);
        if (saved) {
          const state = JSON.parse(saved);
          if (state && state.blocks && state.blocks.length > 0) {
            setBlocks(state.blocks);
            if (state.blockSizes) setBlockSizes(state.blockSizes);
            if (state.buttonPositions) setButtonPositions(state.buttonPositions);
            if (state.buttonsLocked !== undefined) setButtonsLocked(state.buttonsLocked);
            if (state.overlayElements) setOverlayElements(state.overlayElements);
            // Restore background images from IndexedDB
            setTimeout(() => restoreBlockBgImages(state.blocks, setBlocks), 500); setTimeout(() => restoreBlockBgImages(state.blocks, setBlocks), 2000);
            console.log('[AutoSave] Restored state from', state.savedAt);
            setMessage({ text: 'Previous session restored from auto-save!', type: 'success' });
          }
        }
      } catch (e) {
        console.warn('[AutoSave] Failed to restore state:', e);
      }
    }, []);
    const [overlayElements, setOverlayElements] = useState([]);
    const overlayIdCounter = useRef(1);

      // Connect to GitHub
      const connectGitHub = async () => {
        try {
          setLoading(true);
          const OctokitClass = window.Octokit || (await window._waitForOctokit());
            const kit = new OctokitClass({ auth: config.token });
          // Verify connection
          await kit.rest.users.getAuthenticated();
          setOctokit(kit);
          setMessage({ text: 'Connected to GitHub!', type: 'success' });
          // Try to load existing file
          await fetchFile(kit);
        } catch (err) {
          setMessage({ text: 'Connection failed: ' + err.message, type: 'error' });
        } finally {
          setLoading(false);
        }
      };


      // Demo Mode - load default blocks without GitHub
      const loadDemo = () => {
        setOctokit({ demo: true });
        setBlocks([
          { ...BLOCK_TEMPLATES.hero, uid: Date.now() + '-hero' },
          { ...BLOCK_TEMPLATES.player, uid: Date.now() + '-player' },
          { ...BLOCK_TEMPLATES.schedule, uid: Date.now() + '-schedule' },
          { ...BLOCK_TEMPLATES.about, uid: Date.now() + '-about' }
        ]);
        setMessage({ text: 'Demo mode loaded with default templates!', type: 'success' });
      };


      // View generated HTML code
      const [showCode, setShowCode] = useState(false);
      const getFullHTML = () => {
        var h = '<!DOCTYPE html>\n<html lang="en">\n<head>\n';
        h += '  <meta charset="UTF-8" />\n';
        h += '  <meta name="viewport" content="width=device-width, initial-scale=1.0" />\n';
        h += '  <title>One Wave Radio</title>\n';
        h += '  <script src="https://cdn.tailwindcss.com"><\/script>\n';
        h += '  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />\n';
        h += '  <style>body { margin: 0; font-family: system-ui, sans-serif; background: #0f0f0f; color: #fff; } section { width: 1640px; min-height: 1130px; max-width: 100%; margin-left: auto; margin-right: auto; background-size: cover; background-position: center; background-repeat: no-repeat; box-sizing: border-box; overflow: visible; } section .max-w-4xl { max-width: 56rem; margin-left: auto; margin-right: auto; padding-left: 1rem; padding-right: 1rem; } img { max-width: 100%; height: auto; }</style>\n';
        h += '</head>\n<body>\n';
        h += blocks.map(function(b) {
          var tmpDiv = document.createElement('div');
          tmpDiv.innerHTML = b.html;
          var btns = tmpDiv.querySelectorAll('[editable]');
          var hasPositioned = false;
          btns.forEach(function(btn, idx) {
            var posKey = b.uid + '-' + idx;
            var pos = buttonPositions[posKey];
            if (pos) {
              btn.style.position = 'absolute';
              btn.style.left = pos.left + 'px';
              btn.style.top = pos.top + 'px';
              hasPositioned = true;
            }
          });
          if (hasPositioned) {
            var secs = tmpDiv.querySelectorAll('section');
            secs.forEach(function(s) { s.style.position = 'relative'; });
          }
          return tmpDiv.innerHTML;
        }).join('\n');
        h += '\n<script>\n';
      h += '// ONE WAVE RADIO - SHUFFLE PLAYLIST PLAYER\n';
      h += '(function() {\n';

                  />
                </div>
                <button
                  onClick={connectGitHub}
                  disabled={loading || !config.token || !config.owner}
                  class="w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 py-3 rounded-lg font-semibold transition disabled:opacity-50"
                >
                  {loading ? 'Connecting...' : '🔗 Connect & Load Site'}
                </button>
              <button
                onClick={loadDemo}
                class="w-full py-3 mt-3 rounded-xl font-semibold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 transition-all"
              >
                🎮 Demo Mode (No GitHub Needed)
              </button>
              </div>

              <p class="text-xs text-gray-600 mt-4 text-center">
                ⚠️ Your token is securely encrypted and saved to local storage
              </p>
            </div>
          </div>
        );
      }

      return (
        <div class="min-h-screen bg-gray-950">
          {/* Header */}
          <header class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-3">
              <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-400 to-purple-400">
                🎵 OneWave Studio
              </h1>
              <span class="text-gray-500 text-sm">
                {config.owner}/{config.repo}/{config.path}
              </span>
            </div>
            <div class="flex items-center gap-3">
                <button onClick={() => setButtonsLocked(prev => !prev)} title={buttonsLocked ? "Unlock buttons for repositioning" : "Lock buttons in place"} style={{ background: 'none', border: '1px solid rgba(255,255,255,0.3)', borderRadius: '6px', color: buttonsLocked ? '#f87171' : '#4ade80', cursor: 'pointer', padding: '4px 10px', marginRight: '12px', fontSize: '14px', display: 'flex', alignItems: 'center', gap: '6px' }}><i className={buttonsLocked ? "fas fa-lock" : "fas fa-lock-open"}></i>{buttonsLocked ? "Locked" : "Unlocked"}</button>
              <button
              onClick={addTextElement}
              title="Add a text element"
              class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold transition flex items-center gap-1"
            >
              <i class="fas fa-font"></i> Add Text
            </button>
            <button
              onClick={addPhotoElement}
              title="Add a photo element"
              class="px-3 py-1 rounded bg-green-600 hover:bg-green-500 text-white text-sm font-semibold transition flex items-center gap-1"
            >
              <i class="fas fa-image"></i> Add Photo
            </button>
            <button
                onClick={() => { saveToLocalStorage(); setOctokit(null); console.log("[Disconnect] Saved state before disconnect"); setMessage({ text: "Disconnected. Your work is saved locally.", type: "info" }); }}
                class="text-gray-400 hover:text-white text-sm transition"
              >
                Disconnect
              </button>
              <button
                onClick={() => setShowCode(!showCode)}
                class="px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-white font-semibold text-sm transition flex items-center gap-2"
              >
                <i class="fas fa-code"></i> View Code
              </button>
            {/* AutoSave Status Indicator */}
            {autoSaveStatus === 'error' && (
              <span style={{color: '#ef4444', fontSize: '12px', marginRight: '12px'}}>
                <i className="fas fa-exclamation-triangle"></i> AutoSave failed
              </span>
            )}
            {autoSaveStatus === 'warning' && (
              <span style={{color: '#f59e0b', fontSize: '12px', marginRight: '12px'}}>
                <i className="fas fa-exclamation-circle"></i> AutoSave limited
              </span>
            )}
            {autoSaveStatus === 'ok' && (
              <span style={{color: '#22c55e', fontSize: '12px', marginRight: '12px'}}>
                <i className="fas fa-check-circle"></i> AutoSaved
              </span>
            )}
            {/* Manual Save Draft Button */}
            <button
              onClick={() => { const ok = saveToLocalStorage(); setMessage({ text: ok ? 'Draft saved to browser!' : 'Save failed - use Publish instead', type: ok ? 'success' : 'error' }); }}
              style={{marginRight: '8px', padding: '8px 16px', borderRadius: '8px', border: 'none', background: '#3b82f6', color: 'white', cursor: 'pointer', fontSize: '14px', fontWeight: 600}}
            >
              <i className="fas fa-save"></i> Save Draft
            </button>
              <button
                onClick={saveToGitHub}
                disabled={loading}
                class="bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 px-6 py-2 rounded-lg font-semibold transition disabled:opacity-50 flex items-center gap-2"
              >
                {loading ? (
                  <><i class="fas fa-spinner fa-spin"></i> Publishing...</>
                ) : (
                  <><i class="fas fa-cloud-upload-alt"></i> Publish to GitHub</>
                )}
              </button>
            </div>
          </header>

          {message.text && (
            <div class={`px-6 py-2 text-sm ${message.type === 'error' ? 'bg-red-900/50 text-red-300' : message.type === 'success' ? 'bg-green-900/50 text-green-300' : 'bg-blue-900/50 text-blue-300'}`}>
              {message.text}
              <button onClick={() => setMessage({ text: '', type: '' })} class="ml-4 opacity-50 hover:opacity-100">✕</button>
            </div>
          )}

            {/* Sidebar */}
            <aside class="w-64 bg-gray-900 border-r border-gray-800 p-4 min-h-[calc(100vh-57px)] sticky top-[57px]">

              <div class="space-y-2">
                {Object.entries(BLOCK_TEMPLATES).map(([key, template]) => (
                  <button
                    key={key}
                    onClick={() => addBlock(key)}
                    class="w-full text-left px-3 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition flex items-center gap-2 text-sm"
                  >
                    <i class={`fas ${template.icon} text-pink-400`}></i>
                    {template.name}
                  </button>
                ))}
              </div>
              <div class="mt-6 p-3 bg-gray-800/50 rounded-lg">
                <p class="text-xs text-gray-500">
                  💡 <strong>Pro Tip:</strong> Click any text in the preview to edit it directly. Drag blocks to reorder.
                </p>
              </div>
            </aside>

            {/* Main Builder */}
            <main class="flex-1 p-6" style={{ position: 'relative' }}>
              <DragDropContext onDragEnd={onDragEnd}>
                <Droppable droppableId="blocks">
                  {(provided) => (
                    <div ref={provided.innerRef} {...provided.droppableProps} class="space-y-4">
                      {blocks.length === 0 && (
                        <div class="text-center py-20 text-gray-600">
                          <i class="fas fa-plus-circle text-4xl mb-4 block"></i>
                          <p>Add blocks from the sidebar to start building</p>
                        </div>
                      )}
                      {blocks.map((block, index) => (
                        <Draggable key={block.uid} draggableId={block.uid} index={index}>
                          {(provided, snapshot) => (
                            <div
                              ref={provided.innerRef}
                              {...provided.draggableProps}
                              class={`block-wrapper rounded-xl overflow-hidden border ${snapshot.isDragging ? 'border-pink-500 shadow-lg shadow-pink-500/20' : 'border-gray-800'}`}
                      style={blockSizes[block.uid] ? { width: blockSizes[block.uid].width + 'px', height: blockSizes[block.uid].height + 'px', overflow: 'hidden' } : {}}
                            >
                              {/* Block Controls */}
                              <div class="bg-gray-900 px-4 py-2 flex items-center justify-between border-b border-gray-800">
                                <div class="flex items-center gap-2" {...provided.dragHandleProps}>
                                  <i class="fas fa-grip-vertical drag-handle text-gray-600 cursor-grab" title="Drag to reorder"></i>
                                  <span class="text-sm text-gray-400">
                                    <i class={`fas ${block.icon} mr-1`}></i>
                                    {block.name}
                                  </span>
                                </div>
                                <div class="flex items-center gap-1">
                                  <button
                                    onClick={() => moveBlock(index, 'up')}
                                    class="text-gray-600 hover:text-blue-400 transition px-1"
                                    title="Move up"
                                    disabled={index === 0}
                                  >
                                    <i class="fas fa-chevron-up text-xs"></i>
                                  </button>
                                  <button
                                    onClick={() => moveBlock(index, 'down')}
                                    class="text-gray-600 hover:text-blue-400 transition px-1"
                                    title="Move down"
                                    disabled={index === blocks.length - 1}
                                  >
                                    <i class="fas fa-chevron-down text-xs"></i>
                                  </button>
                    <button
                        onClick={() => handleBgUpload(block.uid)}
                        class="text-gray-600 hover:text-purple-400 transition px-2 py-1"
                        title="Set background image"
                    >
                        <i class="fas fa-image"></i>
                    </button>
                                  <button
                                    onClick={() => deleteBlock(block.uid)}
                                    class="text-gray-600 hover:text-red-400 transition px-2 py-1"
                                    title="Delete block"
                                  >
                                    <i class="fas fa-trash-alt"></i>
                                  </button>
                                </div>
                              </div>
                              {/* Live Preview with Inline Editing */}
                              <div
                                ref={(el) => { if (el) applyButtonPositions(el, block.uid); }}
                                class="preview-area"
                                dangerouslySetInnerHTML={{ __html: block.html }}
                                onClick={(e) => {
                                  const el = e.target.closest('[editable]');
                                  if (el) {
                      if (!buttonsLockedRef.current) return;
                                    const currentText = el.textContent;
                                    const newText = prompt('Edit text:', currentText);
                                    if (newText !== null && newText !== currentText) {
                                      const temp = document.createElement('div');
                                      temp.innerHTML = block.html;
                                      const match = temp.querySelector(`[data-field="${el.dataset.field}"]`) || 
                                                     Array.from(temp.querySelectorAll('[editable]')).find(n => n.textContent === currentText);
                                      if (match) {
                                        match.textContent = newText;
                                        updateBlock(block.uid, temp.innerHTML);
                                      }
                                    }
                                  }
                                }}
                              />
                    {/* Resize Handles */}
                    <div
                      className="resize-handle"
                      title="Drag to resize"
                      onMouseDown={(e) => startResize(e, block.uid, 'both')}
                    />
                    <div
                      className="resize-handle-right"
                      title="Drag to resize width"
                      onMouseDown={(e) => startResize(e, block.uid, 'right')}
                    />
                    <div
                      className="resize-handle-bottom"
                      title="Drag to resize height"
                      onMouseDown={(e) => startResize(e, block.uid, 'bottom')}
                    />
                            </div>
                          )}
                        </Draggable>
                      ))}
                      {provided.placeholder}
                    </div>
                  )}
                </Droppable>
              </DragDropContext>

              {/* Overlay Elements */}
              <div style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, pointerEvents: 'none', zIndex: 40 }}>
                {overlayElements.map(el => (
                  <div
                    key={el.id}
                    className="overlay-element"
                    data-id={el.id}
                    style={{
                      position: 'absolute',
                      left: el.x + 'px',
                      top: el.y + 'px',
                      width: el.width + 'px',
                      height: el.height + 'px',
                      border: '2px dashed #ec4899',
                      borderRadius: '4px',
                      cursor: 'move',
                      zIndex: 50,
                      display: 'flex',
                      alignItems: 'center',
                      justifyContent: 'center',
                      backgroundColor: el.type === 'text' ? 'rgba(255,255,255,0.5)' : 'transparent',
                      color: '#1f2937',
                      fontSize: (el.fontSize || 16) + 'px',
                      userSelect: 'none',
                      padding: '4px',
                      boxSizing: 'border-box',
                      pointerEvents: 'auto',
                    }}
                    onMouseDown={(e) => startOverlayDrag(e, el.id)}
                    onDoubleClick={() => {
                      if (el.type === 'text') {
                        const newText = prompt('Edit text:', el.content);
                        if (newText !== null) {
                          updateOverlayElement(el.id, { content: newText });
                        }
                      }
                    }}
                  >
                    {el.type === 'text' && <span>{el.content}</span>}
                    {el.type === 'photo' && <img src={el.content} alt="overlay" style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />}
                    <button
                      onClick={(e) => { e.stopPropagation(); deleteOverlayElement(el.id); }}
                      style={{
                        position: 'absolute', top: '-10px', right: '-10px',
                        background: '#ef4444', color: 'white', border: 'none',
                        borderRadius: '50%', width: '20px', height: '20px',
                        cursor: 'pointer', fontSize: '12px', display: 'flex',
                        alignItems: 'center', justifyContent: 'center', padding: 0,
                        lineHeight: 1,
                      }}
                      title="Delete overlay"
                    >&times;</button>
                    <div
                      style={{
                        position: 'absolute', bottom: '-5px', right: '-5px',
                        width: '10px', height: '10px', background: '#ec4899',
                        cursor: 'nwse-resize', borderRadius: '2px',
                      }}
                      onMouseDown={(e) => { e.stopPropagation(); startOverlayResize(e, el.id, "both"); }}
                    />
                  </div>
                ))}
              </div>


              {/* Code Viewer Modal */}
              {showCode && (
                <div class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                  <div class="bg-gray-900 rounded-2xl border border-gray-700 w-full max-w-4xl max-h-[90vh] flex flex-col">
                    <div class="flex items-center justify-between p-4 border-b border-gray-700">
                      <h3 class="text-lg font-bold text-white"><i class="fas fa-code mr-2"></i>Generated HTML Code</h3>
                      <div class="flex gap-2">
                        <button
                          onClick={() => { navigator.clipboard.writeText(getFullHTML()); setMessage({ text: 'Code copied to clipboard!', type: 'success' }); }}
                          class="px-3 py-1 rounded-lg bg-pink-600 hover:bg-pink-500 text-white text-sm font-semibold transition"
                        >
                          <i class="fas fa-copy mr-1"></i> Copy
                        </button>
                        <button
                          onClick={() => { const w = window.open('','_blank'); w.document.write(getFullHTML()); w.document.close(); }}
                          class="px-3 py-1 rounded-lg bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold transition"
                        >
                          <i class="fas fa-eye mr-1"></i> Preview
                        </button>
                        <button
                          onClick={() => setShowCode(false)}
                          class="px-3 py-1 rounded-lg bg-gray-700 hover:bg-gray-600 text-white text-sm transition"
                        >
                          Close
                        </button>
                      </div>
                    </div>
                    <pre class="p-4 overflow-auto flex-1 text-xs text-green-400 bg-gray-950 rounded-b-2xl"><code>{getFullHTML()}</code></pre>
                  </div>
                </div>
              )}
            </main>
          </div>
        </div>
      );
    }

    // ─── MOUNT ─────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</div>

    "ThursdayMarch12_Newsupdate.mp3"
  ];

  function buildTrackObjects(files) {
    return files.map(function(f) {
      return {
        file: f,
        title: f.replace(/_/g, " ").replace(/\.mp3$/i, ""),
        url: OWR_BUCKET_URL + "/" + encodeURIComponent(f),
        type: "music"
      };
    });
  }

  var owrTracks = buildTrackObjects(OWR_PLAYLIST);
  var owrCurrentIndex = 0;
  var owrIsPlaying = false;
  var owrAutoAdvanceSet = false;

  function owrShuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var temp = arr[i]; arr[i] = arr[j]; arr[j] = temp;
    }
    return arr;
  }

  owrShuffle(owrTracks);

  function owrGetPlayer() {
    return document.getElementById("owrPlayer");
  }

  function owrGetTrackTitle() {
    return document.getElementById("owrTrackTitle");
  }

  function owrSetupAutoAdvance() {
    var player = owrGetPlayer();
    if (player && !owrAutoAdvanceSet) {
      player.addEventListener("ended", function() {
        owrStartTrack(owrCurrentIndex + 1);
      });
      owrAutoAdvanceSet = true;
    }
  }

  function owrStartTrack(index) {
    var player = owrGetPlayer();
    var trackTitle = owrGetTrackTitle();
    if (!player) {
      console.warn("[OWR] Player element not found in DOM yet");
      return;
    }
    owrSetupAutoAdvance();
    if (index >= owrTracks.length) { owrShuffle(owrTracks); index = 0; }
    if (index < 0) { index = owrTracks.length - 1; }
    owrCurrentIndex = index;
    var t = owrTracks[index];
    if (trackTitle) {
      trackTitle.textContent = "Now Playing: " + t.title;
    }
    player.src = t.url;
    player.play().then(function() {
      owrIsPlaying = true;
      console.log("[OWR] Playing: " + t.title + " (" + (index+1) + "/" + owrTracks.length + ")");
    }).catch(function(e) {
      console.log("[OWR] Playback error:", e);
      owrIsPlaying = true; // Still mark as initialized
      if (trackTitle) {
        trackTitle.textContent = "\u25B6 Tap to play: " + t.title;
      }
    });
  }

  // Public API
  window.owrListenLive = function() {
    var player = owrGetPlayer();
    if (!player) {
      console.warn("[OWR] Player not found. Audio Player block may not be added yet.");
      return;
    }
    if (owrIsPlaying) {
      if (player.paused) {
        player.play();
        var tt = owrGetTrackTitle();
        if (tt) tt.textContent = "Now Playing: " + owrTracks[owrCurrentIndex].title;
      } else {
        player.pause();
        var tt = owrGetTrackTitle();
        if (tt) tt.textContent = "Paused: " + owrTracks[owrCurrentIndex].title;
      }
    } else {
      owrStartTrack(owrCurrentIndex);
    }
  };

  window.owrSkipForward = function() {
    owrStartTrack(owrCurrentIndex + 1);
  };

  window.owrPlayPrev = function() {
    owrStartTrack(owrCurrentIndex - 1);
  };

  console.log("[OWR] Shuffle playlist loaded with " + owrTracks.length + " tracks");
})();
