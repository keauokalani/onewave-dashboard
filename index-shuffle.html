<!DOCTYPE html>
<html>
<head>
<title>Listen Live | One Wave Radio</title>
<link rel="stylesheet" href="style.css">
<style>
  body { margin:0; font-family:system-ui,sans-serif; background:#0f0f0f; color:#fff; }
  .hero-section { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; background:linear-gradient(135deg,#4a0e4e,#000,#0e2a4e); padding:40px 20px; }
  .hero-section h1 { font-size:3em; margin-bottom:10px; }
  .hero-section .subtitle { font-size:1.2em; color:#ccc; margin-bottom:10px; }
  .hero-section .artist { font-size:1.4em; color:#e0b0ff; margin-bottom:30px; }
  .hero-section .btn { display:inline-block; padding:12px 32px; border-radius:50px; font-size:16px; font-weight:bold; cursor:pointer; text-decoration:none; transition:background 0.2s; margin:5px; }
  .hero-section .btn-primary { background:#d63384; color:#fff; border:none; }
  .hero-section .btn-primary:hover { background:#e74c9e; }
  .hero-section .btn-outline { background:transparent; color:#fff; border:1px solid rgba(255,255,255,0.3); }
  .hero-section .btn-outline:hover { border-color:#fff; }
  .player-section { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; text-align:center; background:#000; padding-top:390px; padding-left:20px; padding-right:20px; padding-bottom:20px; }
  .player-section h2 { font-size:3em; margin-bottom:5px; }
  .player-section .radio-title { font-size:2.5em; font-weight:bold; color:#e0b0ff; margin-bottom:30px; }
  .player-section #trackTitle { font-size:1.1em; color:#f0a0d0; margin-bottom:15px; }
  .player-section .broadcast-info { font-size:0.9em; color:#999; margin-top:15px; }
  .player-controls { display:flex; align-items:center; justify-content:center; gap:12px; margin-top:20px; }
  .player-controls button { border:none; padding:12px 22px; border-radius:12px; font-size:16px; font-family:Arial,sans-serif; cursor:pointer; transition:background 0.2s; }
  #prevBtn { background:#1e293b; color:#fff; }
  #playBtn { background:#0e91e8; color:#fff; font-weight:bold; padding:14px 32px; }
  #nextBtn { background:#1e293b; color:#fff; }
</style>
</head>
<body>
<!-- PAGE 1: Hero Section -->
<section class="hero-section">
  <h1>One Wave Radio</h1>
  <p class="subtitle">24/7 Original Music</p>
  <p class="artist">by D Oliveira</p>
  <!-- Listen Live button is BELOW D Oliveira text -->
  <div>
    <a href="#player" class="btn btn-primary" onclick="document.getElementById('player').play()">Listen Live</a>
    <a href="#schedule" class="btn btn-outline">View Schedule</a>
  </div>
</section>

<!-- PAGE 2: Player Section -->
<section class="player-section" id="player">
  <h2>One Wave</h2>
  <div class="radio-title">Radio</div>
  <!-- Player controls aligned with sun/horizon line in background image -->
  <audio id="player" crossorigin="anonymous" controls style="display:none"></audio>
  <p id="trackTitle">Loading...</p>
  <div class="player-controls">
    <button id="prevBtn" onclick="playPrev()">&#x23EE; Skip Back</button>
    <button id="playBtn" onclick="playNext()">&#x1F925; Listen Live</button>
    <button id="nextBtn" onclick="skipForward()">Skip Next &#x23ED;</button>
  </div>
  <p class="broadcast-info">Broadcasting 24/7 : Shuffle Playlist</p>
</section>

<script>

var bucketURL = "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev";
var playlist = [
"2000_futuristic_brandy.mp3",
"90s_classic_brandy.mp3",
"Country_Living.mp3",
"Healing_Me.mp3",
"Island_Bounce.mp3",
"Island_Soul_Sunset_V2.mp3",
"Island_soul_heavybass.mp3",
"Island_soul_onedrop.mp3",
"Island_sunset_instrumental.mp3",
"Kaucoffee_islandreggae.mp3",
"Minimaldrill_trap.mp3",
"Mother_of_light.mp3",
"Nvr_say_goodbye_brandy.mp3",
"Slowjamballad_brandy.mp3",
"Softly_loving_you.mp3",
"Softly_loving_you_main.mp3",
"Softlylovingyou_megan_version.mp3",
"Spacetrap_futuristic.mp3",
"UK_Lovers_Reggae.mp3",
"bell_noir.mp3",
"darklane_latenight_drake.mp3",
"dubtouch_reggae.mp3",
"emotionalspace_piano_drake.mp3",
"industrial_street.mp3",
"island_horizon.mp3",
"islandroots_reflections.mp3",
"kaucoffee_islandcountry.mp3",
"latenight_luxury_trap.mp3",
"luxury_glossy_trap.mp3",
"midnightdrift_drake.mp3",
"quiet_reflection.mp3",
"rnb_midtempo_brandy.mp3",
"version_four_drake.mp3",
"version_three_drake.mp3",
"version_two_drake.mp3",
"OWR_MainStation_ID.mp3",
"OneWaveRadio_Station_ID2.mp3",
"OneWaveRadio_Station_ID3.mp3",
"OneWaveRadio_Station_ID4.mp3",
"Your_love_is_healing_me.mp3"
];
var player = document.getElementById("player");
var trackTitle = document.getElementById("trackTitle");
var currentIndex = 0;
function buildTrackObjects(files) {
return files.map(function(f) {
return {
file: f,
title: f.replace(/_/g, " ").replace(/\.mp3$/i, ""),
url: bucketURL + "/" + encodeURIComponent(f),
type: "music"
};
});
}
var tracks = buildTrackObjects(playlist);
function shuffle(arr) {
for (var i = arr.length - 1; i > 0; i--) {
var j = Math.floor(Math.random() * (i + 1));
var temp = arr[i]; arr[i] = arr[j]; arr[j] = temp;
}
return arr;
}
shuffle(tracks);
function startTrack(index) {
if (index >= tracks.length) { shuffle(tracks); index = 0; }
  if (index < 0) { index = tracks.length - 1; }
currentIndex = index;
var t = tracks[index];
trackTitle.textContent = "Now Playing: " + t.title;
player.src = t.url;
player.play().catch(function(e) { console.log("Playback error:", e); });
}
layer.addEventListener("ended", function() { startTrack(currentIndex + 1); });
function playNext() {
startTrack(currentIndex);
}
function skipForward() {
  startTrack(currentIndex + 1);
}
function playPrev() {
  startTrack(currentIndex - 1);
}

</script>
</body>
</html>
